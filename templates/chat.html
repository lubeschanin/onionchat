<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>onionchat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0d0d;display:flex;flex-direction:column;height:100vh}
iframe{border:none}
iframe#chat{flex:1;background:#0d0d0d}
iframe#input{height:50px;background:#111;border-top:1px solid #222}
#bar{background:#0d0d0d;padding:4px 12px;font-family:monospace;font-size:10px;color:#333}
</style>
</head>
<body>
<iframe src="/messages" id="chat"></iframe>
<iframe src="/input" id="input"></iframe>
<div id="bar">
<iframe src="/clock" style="border:none;height:14px;width:100%;background:transparent;display:block"></iframe>
</div>
</body>
</html>
